---
# Sets `lsp_cac_token` with a usable AAP API token (supplied or freshly minted).
# Do NOT name this fact `aap_token`: the "Red Hat Ansible Automation Platform"
# credential type injects `aap_token: "{{oauth_token}}"` as an EXTRA VAR, which
# is empty when the credential has no OAuth token. Extra vars outrank set_fact,
# so an `aap_token` fact would be silently shadowed by that empty value and any
# Bearer auth using it would 401. See issue #61.
- name: Detect a user-supplied AAP_TOKEN
  ansible.builtin.set_fact:
    cac_token_env: "{{ lookup('ansible.builtin.env', 'AAP_TOKEN') | default('', true) }}"

- name: Use the supplied AAP_TOKEN as-is
  ansible.builtin.set_fact:
    lsp_cac_token: "{{ cac_token_env }}"
    cac_token_minted: false
  when: cac_token_env | length > 0

- name: Mint a short-lived CaC token from username/password
  ansible.platform.token:
    aap_hostname: "{{ aap_hostname }}"
    aap_username: "{{ lookup('ansible.builtin.env', 'AAP_CONTROLLER_USERNAME') | default('admin', true) }}"
    aap_password: "{{ lookup('ansible.builtin.env', 'AAP_CONTROLLER_PASSWORD') }}"
    aap_validate_certs: "{{ aap_validate_certs }}"
    description: "lightspeed-patching CaC — auto-managed, deleted in always"
    scope: "{{ cac_token_scope | default('write') }}"
    state: present
  register: cac_token
  when: cac_token_env | length == 0

- name: Adopt the minted token
  ansible.builtin.set_fact:
    lsp_cac_token: "{{ cac_token.ansible_facts.aap_token.token }}"
    cac_token_minted: true
    cac_token_obj: "{{ cac_token.ansible_facts.aap_token }}"
  when: cac_token_env | length == 0
