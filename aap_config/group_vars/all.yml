---
# ============================================================================
# aap.lightspeed.patching CaC variables
# NO secrets in version control. Every sensitive value resolved at runtime
# from an environment variable (see docs/dev-environment.sh.example).
# ============================================================================

# --- AAP API connection -------------------------------------------------------
aap_hostname: "{{ lookup('ansible.builtin.env', 'AAP_HOSTNAME') }}"
aap_token: "{{ lookup('ansible.builtin.env', 'AAP_TOKEN') | default('', true) }}"
aap_validate_certs: "{{ lookup('ansible.builtin.env', 'AAP_VALIDATE_CERTS') | default('false', true) | bool }}"
aap_username: "{{ lookup('ansible.builtin.env', 'AAP_CONTROLLER_USERNAME') | default('admin', true) }}"
aap_password: "{{ lookup('ansible.builtin.env', 'AAP_CONTROLLER_PASSWORD') }}"

# --- Automation Hub (Galaxy credentials for the org) -------------------------
hub_token: "{{ lookup('ini', 'token section=galaxy_server.rh_certified file=~/.ansible.cfg') }}"
hub_auth_url: "https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token"

# --- Org + EE ----------------------------------------------------------------
my_organization: "IT Service Automation"
ah_hostname: "{{ lookup('ansible.builtin.env', 'AH_HOSTNAME') | default(aap_hostname | urlsplit('hostname'), true) }}"

ee_name: "Lightspeed Patching - EE"
ee_version: "{{ lookup('ansible.builtin.env', 'LIGHTSPEED_PATCHING_EE_VERSION') | default('v1.1.0', true) }}"
# Default: the Private Automation Hub copy at the pinned IMMUTABLE semver tag.
# PAH syncs it from quay.io (hub_ee_registries.yml / hub_ee_repositories.yml) and
# Controller pulls it from PAH via cred_hub_registry — the image never leaves the
# platform at job-run time. The Hub image name is the hub_ee_repositories[].name
# (lightspeed_patching_ee). Override with the public quay.io image only for a
# Hub-less smoke test:
#   export LIGHTSPEED_PATCHING_EE_IMAGE=quay.io/zigfreed/lightspeed-patching-ee:latest
ee_image: "{{ lookup('ansible.builtin.env', 'LIGHTSPEED_PATCHING_EE_IMAGE') | default(ah_hostname ~ '/lightspeed_patching_ee:' ~ ee_version, true) }}"
my_execution_environment: "{{ ee_name }}"

# --- Private Automation Hub registry (EE pull) -------------------------------
# Container Registry credential Controller uses to pull the EE from PAH. On the
# AAP 2.5/2.6 unified platform the Hub registry authenticates with the platform
# admin credentials, so it reuses the controller username/password.
cred_hub_registry: "Lightspeed Patching - Hub Registry"
hub_registry_host: "{{ ah_hostname }}"
hub_registry_username: "{{ controller_cred_username }}"
hub_registry_password: "{{ controller_cred_password }}"

controller_cred_host: "{{ aap_hostname }}"
controller_cred_username: "{{ lookup('ansible.builtin.env', 'AAP_CONTROLLER_USERNAME') | default('admin', true) }}"
controller_cred_password: "{{ lookup('ansible.builtin.env', 'AAP_CONTROLLER_PASSWORD') }}"

# --- AWS ---------------------------------------------------------------------
aws_access_key_id: "{{ lookup('ansible.builtin.env', 'AWS_ACCESS_KEY_ID') }}"
aws_secret_access_key: "{{ lookup('ansible.builtin.env', 'AWS_SECRET_ACCESS_KEY') }}"
aws_default_region: "{{ lookup('ansible.builtin.env', 'AWS_DEFAULT_REGION') | default('us-east-1', true) }}"
aws_tf_state_bucket: "{{ lookup('ansible.builtin.env', 'AWS_TF_STATE_BUCKET') }}"

# --- SSH / Linux machine -----------------------------------------------------
# SSH key: ~/.ssh/id_rsa (Q1 resolved 2026-06-12)
linux_admin_username: "{{ lookup('ansible.builtin.env', 'LINUX_ADMIN_USERNAME') | default('ec2-user', true) }}"
linux_ssh_public_key: "{{ lookup('ansible.builtin.env', 'LINUX_SSH_PUBLIC_KEY') }}"
linux_ssh_private_key: "{{ lookup('ansible.builtin.env', 'LINUX_SSH_PRIVATE_KEY') }}"

# --- Red Hat CDN -------------------------------------------------------------
rh_org_id: "{{ lookup('ansible.builtin.env', 'RH_ORG_ID') }}"
rh_activation_key: "{{ lookup('ansible.builtin.env', 'RH_ACTIVATION_KEY') }}"

# --- ServiceNow --------------------------------------------------------------
servicenow_instance: "{{ lookup('ansible.builtin.env', 'SN_HOST') }}"
servicenow_username: "{{ lookup('ansible.builtin.env', 'SN_USERNAME') }}"
servicenow_password: "{{ lookup('ansible.builtin.env', 'SN_PASSWORD') }}"

# EDA bearer token — matched pair: same value in AAP EDA event-stream credential
# AND in the ServiceNow Business Rule outbound REST header.
# Generate: openssl rand -hex 32
eda_event_stream_token: "{{ lookup('ansible.builtin.env', 'EDA_EVENT_STREAM_TOKEN') }}"

# Red Hat service-account creds for Automation Analytics / Insights — feed the
# Automation Calculator on console.redhat.com (consumed by
# files/controller_settings.yml). These are console.redhat.com SERVICE ACCOUNT
# client ID/secret, NOT a portal username/password. Leave unset to skip
# analytics auth; tracking still flips on but uploads won't authenticate.
redhat_subscriptions_client_id: "{{ lookup('ansible.builtin.env', 'REDHAT_SUBSCRIPTIONS_CLIENT_ID') | default('', true) }}"
redhat_subscriptions_client_secret: "{{ lookup('ansible.builtin.env', 'REDHAT_SUBSCRIPTIONS_CLIENT_SECRET') | default('', true) }}"

# Red Hat Insights API — service account for direct API calls (inventory lookup,
# vulnerability queries). Distinct from the Automation Analytics service account
# above. Create at console.redhat.com → IAM → Service Accounts.
insights_base_url: "{{ lookup('ansible.builtin.env', 'INSIGHTS_BASE_URL') | default('https://console.redhat.com', true) }}"
insights_client_id: "{{ lookup('ansible.builtin.env', 'INSIGHTS_CLIENT_ID') | default('', true) }}"
insights_client_secret: "{{ lookup('ansible.builtin.env', 'INSIGHTS_CLIENT_SECRET') | default('', true) }}"

# --- EDA object names --------------------------------------------------------
eda_project_name: "Lightspeed Patching - EDA"
eda_controller_credential: "Lightspeed Patching - EDA Controller"
eda_snow_event_stream_credential: "Lightspeed Patching - ServiceNow Event Stream"
eda_event_stream_name: "Lightspeed Patching - ServiceNow Event Stream"
eda_scm_credential: "Lightspeed Patching - EDA Source Control"
eda_catalog_activation_name: "Lightspeed Patching - Catch SNow Catalog Orders"
eda_incident_activation_name: "Lightspeed Patching - Catch SNow Incidents"
eda_decision_environment: "{{ lookup('ansible.builtin.env', 'LIGHTSPEED_EDA_DE') | default('Default Decision Environment', true) }}"

# The ServiceNow catalog item short_description — EDA rulebook matches on this
# exact string. Must equal the catalog item's Short description verbatim.
my_snow_catalog_short_description: "Lightspeed Patching - Request RHEL VM"

# ServiceNow CMDB Business Application that provisioned hosts are related to
# (cmdb_ci_business_app). register_cmdb_and_relate.yml creates it if missing.
# Dedicated to this demo — distinct from the shared "Ansible Demonstrations" app.
cmdb_business_app: "Lightspeed Patching Demo"

# ServiceNow user (user_name) recorded as 'Managed by' on CMDB CIs.
# Resolved to a sys_user sys_id at runtime by register_cmdb_and_relate.yml.
# Override locally via CMDB_MANAGED_BY (docs/dev-environment.sh); defaults to
# 'hercules' so workflow runs stay green even when the env var is unset.
cmdb_managed_by: "{{ lookup('ansible.builtin.env', 'CMDB_MANAGED_BY') | default('hercules', true) }}"

# --- AAP object names (namespace: "Lightspeed Patching -") -------------------
project_name: "Lightspeed Patching"
inventory_name: "lightspeed-patching"
control_inventory_name: "lightspeed-patching-control"
workflow_provision_name: "Lightspeed Patching - Provision and Onboard"
workflow_remediate_name: "Lightspeed Patching - Remediate CVE Workflow"

cred_aws: "Lightspeed Patching - AWS"
cred_linux: "Lightspeed Patching - Linux Machine"
cred_controller: "Lightspeed Patching - Controller"
cred_servicenow: "Lightspeed Patching - ServiceNow"
cred_rh_cdn: "Lightspeed Patching - Red Hat CDN"

# Job template names
jt_provision: "Lightspeed Patching - Provision VM (AWS)"
jt_teardown: "Lightspeed Patching - Teardown VM (AWS)"
jt_configure_motd: "Lightspeed Patching - Configure MOTD"
jt_register_rhel: "Lightspeed Patching - Register RHEL"
jt_register_cmdb: "Lightspeed Patching - Register CMDB CI"
jt_patch_rhel: "Lightspeed Patching - Patch RHEL"
jt_introduce_cve: "Lightspeed Patching - Introduce CVE (Demo Setup)"
jt_remediate_cve: "Lightspeed Patching - Remediate CVE"
jt_snow_notice_started: "Lightspeed Patching - SNow Notice Started"
jt_snow_notice_provision: "Lightspeed Patching - SNow Notice Provision Started"
jt_snow_update_ritm_success: "Lightspeed Patching - SNow Update RITM (success)"
jt_snow_update_ritm_failure: "Lightspeed Patching - SNow Update RITM (failure)"
jt_snow_update_inc: "Lightspeed Patching - SNow Update Incident"
jt_snow_close_inc: "Lightspeed Patching - SNow Close Incident"
jt_snow_create_inc: "Lightspeed Patching - SNow Create Incident (failure)"
jt_snow_relate_cmdb: "Lightspeed Patching - SNow Relate CMDB CI to Incident"
jt_snow_correlation_id: "Lightspeed Patching - SNow Stamp Correlation ID"

# Nightly teardown schedule names (controller_schedules.yml) — 6 PM + 10 PM.
teardown_schedule_name: "Lightspeed Patching - Nightly Teardown 6 PM"
teardown_schedule_name_late: "Lightspeed Patching - Nightly Teardown 10 PM"

# T-shirt sizes → AWS instance types
vm_size_map:
  small: t3.medium      # 2 vCPU, 4 GiB
  medium: t3.large      # 2 vCPU, 8 GiB
  large: t3.xlarge      # 4 vCPU, 16 GiB
