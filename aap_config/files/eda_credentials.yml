---
eda_credentials:
  - name: "{{ eda_controller_credential }}"
    organization: "{{ my_organization }}"
    credential_type: "Red Hat Ansible Automation Platform"
    description: "AAP Controller — EDA rulebook activations launch workflows here"
    inputs:
      host: "{{ aap_hostname }}/api/controller/"
      username: "{{ controller_cred_username }}"
      password: "{{ controller_cred_password }}"
      verify_ssl: false

  - name: "{{ eda_snow_event_stream_credential }}"
    organization: "{{ my_organization }}"
    credential_type: "Token Event Stream"
    description: "Bearer token for the ServiceNow → EDA webhook (matched pair with SNow BR)"
    inputs:
      token: "{{ eda_event_stream_token }}"
