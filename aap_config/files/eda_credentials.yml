---
# ============================================================================
# aap_config/files/eda_credentials.yml
# ============================================================================
# EDA credential definitions for AAP config-as-code.
# Secrets are referenced by name only — values are set manually or via Vault.
# ============================================================================

eda_credentials:
  - name: "Lightspeed Patching - Controller"
    credential_type: "Red Hat Ansible Automation Platform"
    description: "AAP Controller credential for EDA rulebook activations"
    inputs:
      host: "{{ eda_controller_url }}"
      verify_ssl: false

  - name: "Lightspeed Patching - Insights Event Stream"
    credential_type: "Token based authentication"
    description: "Bearer token for the Insights → EDA webhook (matched pair)"
    inputs: {}

  - name: "Lightspeed Patching - ServiceNow"
    credential_type: "ServiceNow ITSM"
    description: "ServiceNow API credentials for CHG and CMDB updates"
    inputs: {}
