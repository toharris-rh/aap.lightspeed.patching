---
# NOTE: the infra.aap_configuration role uses `controller_templates` (not
# `controller_job_templates`) — a known collection quirk.
controller_templates:

  # ── Provision ──────────────────────────────────────────────────────────────
  - name: "{{ jt_provision }}"
    job_type: run
    organization: "{{ my_organization }}"
    inventory: "{{ inventory_name }}"
    project: "{{ project_name }}"
    playbook: playbooks/provision_vm_aws.yml
    execution_environment: "{{ my_execution_environment }}"
    credentials:
      - "{{ cred_aws }}"
      - "{{ cred_controller }}"
    extra_vars:
      aws_region: "{{ aws_default_region }}"
      aws_tf_state_bucket: "{{ aws_tf_state_bucket }}"
      linux_ssh_public_key: "{{ linux_ssh_public_key }}"
    survey_enabled: true
    survey_spec:
      name: ""
      description: "Pick a VM size"
      spec:
        - question_name: VM size
          question_description: "RHEL server t-shirt size on AWS"
          variable: vm_size_tier
          type: multiplechoice
          required: true
          default: medium
          choices:
            - small
            - medium
            - large

  # ── Teardown ─────────────────────────────────────────────────────────────
  # Unregisters the host from the CDN + Insights, then terraform destroy +
  # deregisters it from the inventory. Idempotent (no VM -> no-op). Driven by
  # the nightly 6 PM / 10 PM schedules (controller_schedules.yml).
  - name: "{{ jt_teardown }}"
    job_type: run
    organization: "{{ my_organization }}"
    inventory: "{{ inventory_name }}"
    project: "{{ project_name }}"
    playbook: playbooks/teardown_vm_aws.yml
    execution_environment: "{{ my_execution_environment }}"
    credentials:
      - "{{ cred_aws }}"            # AWS_* for terraform destroy
      - "{{ cred_linux }}"          # SSH for the unregister play
      - "{{ cred_controller }}"     # mint a token for inventory deregistration
    extra_vars:
      aws_region: "{{ aws_default_region }}"
      aws_tf_state_bucket: "{{ aws_tf_state_bucket }}"
      linux_ssh_public_key: "{{ linux_ssh_public_key }}"

  # ── Configure MOTD ─────────────────────────────────────────────────────────
  - name: "{{ jt_configure_motd }}"
    job_type: run
    organization: "{{ my_organization }}"
    inventory: "{{ inventory_name }}"
    project: "{{ project_name }}"
    playbook: playbooks/configure_motd.yml
    execution_environment: "{{ my_execution_environment }}"
    credentials:
      - "{{ cred_linux }}"
    ask_limit_on_launch: true

  # ── Register RHEL ──────────────────────────────────────────────────────────
  - name: "{{ jt_register_rhel }}"
    job_type: run
    organization: "{{ my_organization }}"
    inventory: "{{ inventory_name }}"
    project: "{{ project_name }}"
    playbook: playbooks/register_rhel.yml
    execution_environment: "{{ my_execution_environment }}"
    credentials:
      - "{{ cred_linux }}"
      - "{{ cred_rh_cdn }}"
    ask_limit_on_launch: true

  # ── Register CMDB CI + relate to Business Application ─────────────────────
  - name: "{{ jt_register_cmdb }}"
    job_type: run
    organization: "{{ my_organization }}"
    inventory: "{{ control_inventory_name }}"
    project: "{{ project_name }}"
    playbook: playbooks/servicenow/register_cmdb_and_relate.yml
    execution_environment: "{{ my_execution_environment }}"
    credentials:
      - "{{ cred_servicenow }}"
    ask_variables_on_launch: true
    extra_vars:
      cmdb_business_app: "{{ cmdb_business_app }}"
      cmdb_managed_by: "{{ cmdb_managed_by }}"

  # ── Stamp Insights UUID into CMDB correlation_id ─────────────────────────
  # Runs after Register RHEL (Insights registration). Reads the Insights UUID
  # from /etc/insights-client/machine-id on the host (SSH), then PATCHes
  # correlation_id on the CMDB CI via ServiceNow.
  - name: "{{ jt_snow_correlation_id }}"
    job_type: run
    organization: "{{ my_organization }}"
    inventory: "{{ inventory_name }}"
    project: "{{ project_name }}"
    playbook: playbooks/servicenow/update_cmdb_correlation_id.yml
    execution_environment: "{{ my_execution_environment }}"
    credentials:
      - "{{ cred_linux }}"
      - "{{ cred_servicenow }}"
    ask_variables_on_launch: true

  # ── Patch RHEL (full) ──────────────────────────────────────────────────────
  - name: "{{ jt_patch_rhel }}"
    job_type: run
    organization: "{{ my_organization }}"
    inventory: "{{ inventory_name }}"
    project: "{{ project_name }}"
    playbook: playbooks/patch_rhel.yml
    execution_environment: "{{ my_execution_environment }}"
    credentials:
      - "{{ cred_linux }}"
      - "{{ cred_servicenow }}"
    ask_limit_on_launch: true

  # ── CVE Remediation ────────────────────────────────────────────────────────
  - name: "{{ jt_remediate_cve }}"
    job_type: run
    organization: "{{ my_organization }}"
    inventory: "{{ inventory_name }}"
    project: "{{ project_name }}"
    playbook: playbooks/remediate_cve.yml
    execution_environment: "{{ my_execution_environment }}"
    credentials:
      - "{{ cred_linux }}"
      - "{{ cred_servicenow }}"
    ask_limit_on_launch: true

  # ── Demo Setup: Introduce CVE ──────────────────────────────────────────────
  - name: "{{ jt_introduce_cve }}"
    job_type: run
    organization: "{{ my_organization }}"
    inventory: "{{ inventory_name }}"
    project: "{{ project_name }}"
    playbook: playbooks/introduce_cve.yml
    execution_environment: "{{ my_execution_environment }}"
    credentials:
      - "{{ cred_linux }}"
    ask_limit_on_launch: true

  # ── ServiceNow callbacks (Provision workflow — RITM) ────────────────────────
  - name: "{{ jt_snow_notice_provision }}"
    job_type: run
    organization: "{{ my_organization }}"
    inventory: "{{ control_inventory_name }}"
    project: "{{ project_name }}"
    playbook: playbooks/servicenow/notice_provision_started.yml
    execution_environment: "{{ my_execution_environment }}"
    credentials:
      - "{{ cred_servicenow }}"
      - "{{ cred_controller }}"

  - name: "{{ jt_snow_update_ritm_success }}"
    job_type: run
    organization: "{{ my_organization }}"
    inventory: "{{ control_inventory_name }}"
    project: "{{ project_name }}"
    playbook: playbooks/servicenow/update_ritm.yml
    execution_environment: "{{ my_execution_environment }}"
    credentials:
      - "{{ cred_servicenow }}"
    extra_vars:
      ritm_outcome: success

  - name: "{{ jt_snow_update_ritm_failure }}"
    job_type: run
    organization: "{{ my_organization }}"
    inventory: "{{ control_inventory_name }}"
    project: "{{ project_name }}"
    playbook: playbooks/servicenow/update_ritm.yml
    execution_environment: "{{ my_execution_environment }}"
    credentials:
      - "{{ cred_servicenow }}"
    extra_vars:
      ritm_outcome: failure

  # ── ServiceNow callbacks (Remediate workflow — Incident) ───────────────────
  - name: "{{ jt_snow_notice_started }}"
    job_type: run
    organization: "{{ my_organization }}"
    inventory: "{{ control_inventory_name }}"
    project: "{{ project_name }}"
    playbook: playbooks/servicenow/notice_patch_started.yml
    execution_environment: "{{ my_execution_environment }}"
    credentials:
      - "{{ cred_servicenow }}"
      - "{{ cred_controller }}"

  - name: "{{ jt_snow_update_inc }}"
    job_type: run
    organization: "{{ my_organization }}"
    inventory: "{{ control_inventory_name }}"
    project: "{{ project_name }}"
    playbook: playbooks/servicenow/update_incident.yml
    execution_environment: "{{ my_execution_environment }}"
    credentials:
      - "{{ cred_servicenow }}"
    extra_vars:
      inc_outcome: in_progress

  - name: "{{ jt_snow_close_inc }}"
    job_type: run
    organization: "{{ my_organization }}"
    inventory: "{{ control_inventory_name }}"
    project: "{{ project_name }}"
    playbook: playbooks/servicenow/update_incident.yml
    execution_environment: "{{ my_execution_environment }}"
    credentials:
      - "{{ cred_servicenow }}"
    extra_vars:
      inc_outcome: success

  - name: "{{ jt_snow_create_inc }}"
    job_type: run
    organization: "{{ my_organization }}"
    inventory: "{{ control_inventory_name }}"
    project: "{{ project_name }}"
    playbook: playbooks/servicenow/create_incident.yml
    execution_environment: "{{ my_execution_environment }}"
    credentials:
      - "{{ cred_servicenow }}"

  # ── CMDB CI → Incident (Insights-scoped to provisioned host) ─────────────
  - name: "{{ jt_snow_relate_cmdb }}"
    job_type: run
    organization: "{{ my_organization }}"
    inventory: "{{ control_inventory_name }}"
    project: "{{ project_name }}"
    playbook: playbooks/servicenow/relate_cmdb_to_incident.yml
    execution_environment: "{{ my_execution_environment }}"
    credentials:
      - "{{ cred_servicenow }}"
    survey_enabled: true
    survey_spec:
      name: ""
      description: "Link a provisioned host's CMDB CI to a ServiceNow incident"
      spec:
        - question_name: Incident Number
          question_description: "ServiceNow incident to update (e.g. INC0011410)"
          variable: incident_number
          type: text
          required: true
          default: ""
        - question_name: Host FQDN
          question_description: "FQDN of the provisioned host to scope patching to"
          variable: host_fqdn
          type: text
          required: true
          default: ""
        - question_name: CVE ID
          question_description: "CVE being addressed (informational, added to work note)"
          variable: cve_id
          type: text
          required: false
          default: ""
