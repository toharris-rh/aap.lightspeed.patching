---
# Custom credential type that injects Red Hat CDN registration vars
# (RH_ORG_ID + RH_ACTIVATION_KEY) as environment variables.
# Consumed by the Register RHEL job template.
controller_credential_types:
  - name: "Red Hat CDN Registration"
    description: "Injects RH_ORG_ID and RH_ACTIVATION_KEY for subscription-manager"
    kind: cloud
    inputs:
      fields:
        - id: rh_org_id
          type: string
          label: "Red Hat Org ID"
        - id: rh_activation_key
          type: string
          label: "Activation Key"
          secret: true
      required:
        - rh_org_id
        - rh_activation_key
    injectors:
      env:
        RH_ORG_ID: "{{ '{{' }} rh_org_id {{ '}}' }}"
        RH_ACTIVATION_KEY: "{{ '{{' }} rh_activation_key {{ '}}' }}"
