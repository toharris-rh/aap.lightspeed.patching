---
controller_credential_types:
  - name: "Red Hat CDN Registration"
    description: "Injects RH_ORG_ID and RH_ACTIVATION_KEY for subscription-manager"
    inputs:
      fields:
        - id: rh_org_id
          type: string
          label: "Red Hat Org ID"
        - id: rh_activation_key
          type: string
          label: "Activation Key"
          secret: true
      required:
        - rh_org_id
        - rh_activation_key
    injectors:
      env:
        RH_ORG_ID: !unsafe '{{rh_org_id}}'
        RH_ACTIVATION_KEY: !unsafe '{{rh_activation_key}}'

  - name: "ServiceNow ITSM"
    description: "Injects SN_HOST, SN_USERNAME, and SN_PASSWORD for servicenow.itsm modules"
    inputs:
      fields:
        - id: instance
          type: string
          label: "Instance"
        - id: username
          type: string
          label: "Username"
        - id: password
          type: string
          label: "Password"
          secret: true
      required:
        - instance
        - username
        - password
    injectors:
      env:
        SN_HOST: !unsafe '{{instance}}'
        SN_USERNAME: !unsafe '{{username}}'
        SN_PASSWORD: !unsafe '{{password}}'
