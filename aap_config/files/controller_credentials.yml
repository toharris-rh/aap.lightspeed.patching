---
# Consumed by infra.aap_configuration.controller_credentials.
# Inputs come from env-var lookups in group_vars/all.yml — no secrets here.
controller_credentials:
  # ── Galaxy / Automation Hub ──────────────────────────────────────────────────
  - name: Automation Hub - certified
    organization: "{{ my_organization }}"
    credential_type: "Ansible Galaxy/Automation Hub API Token"
    inputs:
      url: "https://console.redhat.com/api/automation-hub/content/published/"
      auth_url: "{{ hub_auth_url }}"
      token: "{{ hub_token }}"

  - name: Automation Hub - validated
    organization: "{{ my_organization }}"
    credential_type: "Ansible Galaxy/Automation Hub API Token"
    inputs:
      url: "https://console.redhat.com/api/automation-hub/content/validated/"
      auth_url: "{{ hub_auth_url }}"
      token: "{{ hub_token }}"

  # ── Project credentials ─────────────────────────────────────────────────────
  - name: "{{ cred_aws }}"
    organization: "{{ my_organization }}"
    credential_type: Amazon Web Services
    inputs:
      username: "{{ aws_access_key_id }}"
      password: "{{ aws_secret_access_key }}"

  - name: "{{ cred_linux }}"
    organization: "{{ my_organization }}"
    credential_type: Machine
    inputs:
      username: "{{ linux_admin_username }}"
      ssh_key_data: "{{ linux_ssh_private_key }}"

  - name: "{{ cred_controller }}"
    organization: "{{ my_organization }}"
    credential_type: Red Hat Ansible Automation Platform
    inputs:
      host: "{{ controller_cred_host }}"
      username: "{{ controller_cred_username }}"
      password: "{{ controller_cred_password }}"

  - name: "{{ cred_servicenow }}"
    organization: "{{ my_organization }}"
    credential_type: ServiceNow ITSM
    inputs:
      instance: "{{ servicenow_instance }}"
      username: "{{ servicenow_username }}"
      password: "{{ servicenow_password }}"

  - name: "{{ cred_rh_cdn }}"
    organization: "{{ my_organization }}"
    credential_type: Red Hat CDN Registration
    inputs:
      rh_org_id: "{{ rh_org_id }}"
      rh_activation_key: "{{ rh_activation_key }}"
