---
# ============================================================================
# aap.lightspeed.patching — AAP Configuration as Code entry point
# ============================================================================
# Bootstraps every AAP object from the files/ directory using the
# infra.aap_configuration.dispatch role. Re-running is idempotent.
#
# Prerequisites:
#   - Collections installed: ansible-galaxy collection install -r aap_config/requirements.yml
#   - Credentials exported: source docs/dev-environment.sh
#   - AAP instance reachable (AAP_HOSTNAME)
#
# Run:
#   source docs/dev-environment.sh && \
#   ansible-playbook aap_config/load.yml 2>&1 | tee /tmp/load-$(date +%Y%m%d-%H%M%S).log
# ============================================================================

- name: Apply aap.lightspeed.patching AAP configuration
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    cac_token_scope: write
  vars_files:
    - files/gateway_settings.yml
    - files/gateway_organizations.yml
    - files/eda_credentials.yml
    - files/eda_event_streams.yml
    - files/eda_projects.yml
    - files/eda_rulebook_activations.yml
    - files/controller_credential_types.yml
    - files/controller_credentials.yml
    - files/controller_projects.yml
    - files/controller_inventories.yml
    - files/controller_execution_environments.yml
    - files/controller_job_templates.yml
    - files/controller_workflow_job_templates.yml
    - files/controller_schedules.yml
  tasks:
    - name: Apply CaC and clean up token
      block:
        - name: Acquire AAP API token
          ansible.builtin.include_tasks: tasks/aap_token_acquire.yml

        - name: Apply all AAP objects via dispatch
          ansible.builtin.include_role:
            name: infra.aap_configuration.dispatch
          vars:
            aap_configuration_secure_logging: false

      always:
        - name: Release AAP API token
          ansible.builtin.include_tasks: tasks/aap_token_release.yml
