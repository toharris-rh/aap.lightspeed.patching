---
- name: Configure pre-login banner and MOTD
  hosts: all
  gather_facts: false
  become: true

  tasks:
    - name: Deploy pre-login banner
      ansible.builtin.copy:
        src: issue
        dest: "{{ item }}"
        owner: root
        group: root
        mode: "0644"
      loop:
        - /etc/issue
        - /etc/issue.net

    - name: Deploy MOTD
      ansible.builtin.copy:
        src: motd
        dest: /etc/motd
        owner: root
        group: root
        mode: "0644"

    - name: Enable the sshd pre-login banner (/etc/issue.net)
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/99-lightspeed-banner.conf
        content: "Banner /etc/issue.net\n"
        owner: root
        group: root
        mode: "0644"
        validate: "sshd -t -f %s"
      notify: Reload sshd

  handlers:
    - name: Reload sshd
      ansible.builtin.service:
        name: sshd
        state: reloaded
