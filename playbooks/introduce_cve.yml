---
# ============================================================================
# playbooks/introduce_cve.yml — DEMO SETUP ONLY
# ============================================================================
# Downgrades a userspace package to a version with a known CVE so Red Hat
# Insights will detect the advisory and trigger the remediation workflow.
#
# After running this playbook:
#   insights-client runs automatically at the end of this play.
#   → Insights detects the advisory
#   → EDA fires → remediate_cve.yml runs → INC closed
#
# Inputs (via survey or extra_vars):
#   target_package   package name to downgrade (default: openssl)
#   target_version   epoch:version-release to pin (default: 1:3.5.5-2.el9_8)
#
# Credentials: Lightspeed Patching - Linux Machine (SSH)
# ============================================================================

- name: Introduce a known CVE for demo purposes (package downgrade)
  hosts: all
  gather_facts: false
  become: true

  vars:
    target_package: "openssl"
    target_version: "1:3.5.5-2.el9_8"

  tasks:
    - name: Downgrade {{ target_package }} to vulnerable version
      ansible.builtin.dnf:
        name: "{{ target_package }}-{{ target_version }}"
        state: present
        allow_downgrade: true
      register: dnf_result

    - name: Confirm installed version
      ansible.builtin.command:
        cmd: "rpm -q {{ target_package }}"
      register: rpm_query
      changed_when: false

    - name: Show installed version
      ansible.builtin.debug:
        msg: "{{ rpm_query.stdout }} — CVE now present."

    - name: Update subscription-manager facts
      ansible.builtin.command:
        cmd: subscription-manager facts --update
      changed_when: false

    - name: Run insights-client
      ansible.builtin.command:
        cmd: insights-client
      changed_when: false
      failed_when: false
