---
# ============================================================================
# playbooks/servicenow/register_cmdb_and_relate.yml
# ============================================================================
# Registers a provisioned RHEL host as a ServiceNow CMDB CI
# (cmdb_ci_linux_server), relates it to the "Lightspeed Patching Demo"
# Business Application (cmdb_ci_business_app), and — when triggered via a
# ServiceNow catalog order — links the CI to the originating RITM via the
# task_ci (Affected CIs) junction table.
#
# Uses servicenow.itsm.configuration_item with state: present (upsert) so
# re-runs update stale fields rather than silently skipping.
#
# Consumed inputs (workflow artifacts from Provision VM via set_stats):
#   linux_fqdn            public DNS          -> name / fqdn
#   linux_public_ip       public IP           -> ip_address
#   linux_instance_id     EC2 instance ID     -> serial_number
#   linux_vm_size_chosen  AWS instance type   -> other.model_number
#
# Optional inputs (from EDA rulebook / workflow extra_vars):
#   ticket_number         RITM number (e.g. RITM0010042) — guards RITM linkage
#   ticket_sys_id         RITM sys_id (skips the lookup when present)
#   cmdb_managed_by       SN user_name -> CI 'Managed by' (default: hercules)
#
# Note: the Insights inventory UUID is stamped into the CI's correlation_id
# separately by update_cmdb_correlation_id.yml, after Insights registration.
#
# Credential: Lightspeed Patching - ServiceNow  (SN_* env vars)
# ============================================================================

- name: Register host in CMDB and relate it to the Business Application
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ci_resource: cmdb_ci_linux_server
    ba_resource: cmdb_ci_business_app
    cmdb_rel_type: "Uses::Used by"
    cmdb_ci_fqdn: "{{ host_fqdn | default(linux_fqdn | default('')) }}"
    cmdb_ci_ip: "{{ host_ip | default(linux_public_ip | default('')) }}"
    cmdb_ci_instance: "{{ host_instance_id | default(linux_instance_id | default('')) }}"
    cmdb_ci_size: "{{ host_vm_size | default(linux_vm_size_chosen | default('')) }}"
    ci_environment: production
    ci_install_status: installed
    ci_operational_status: operational
    ci_category: Hardware
    ci_support_group: "Ansible West Tigers"
    ci_assigned_to: service.ansible
    # ServiceNow user_name recorded as 'Managed by' on the CI. Resolved to a
    # sys_user sys_id below. Defaults to 'hercules' for standalone runs.
    # NOTE: distinct from the 'cmdb_managed_by' input so the value does not
    # template itself — a self-referential play var (cmdb_managed_by:
    # "{{ cmdb_managed_by | default(...) }}") triggers Ansible's "recursive
    # loop detected" error (issue #80).
    managed_by_user: "{{ cmdb_managed_by | default('hercules') }}"

  tasks:
    - name: Require a host FQDN
      ansible.builtin.assert:
        that:
          - cmdb_ci_fqdn | length > 0
          - cmdb_business_app | default('') | length > 0
        fail_msg: >-
          Provide host_fqdn=<fqdn> (or linux_fqdn) and cmdb_business_app.

    # --- Business Application (create if missing) ----------------------------
    - name: Look up the Business Application by name
      servicenow.itsm.api_info:
        resource: "{{ ba_resource }}"
        sysparm_query: "name={{ cmdb_business_app }}"
      register: ba_lookup

    - name: Create the Business Application if it does not exist
      when: ba_lookup.record | length == 0
      servicenow.itsm.api:
        action: post
        resource: "{{ ba_resource }}"
        data:
          name: "{{ cmdb_business_app }}"
          short_description: >-
            RHEL hosts provisioned and patched by the Lightspeed Patching demo
            (AAP + EDA + Red Hat Insights + ServiceNow).
          operational_status: "1"
      register: ba_created

    - name: Resolve the Business Application sys_id
      ansible.builtin.set_fact:
        ba_sys_id: "{{ ba_lookup.record[0].sys_id if (ba_lookup.record | length > 0) else ba_created.record.sys_id }}"

    # --- 'Managed by' user (resolve user_name -> sys_id) ---------------------
    - name: Look up the 'Managed by' user by user_name
      servicenow.itsm.api_info:
        resource: sys_user
        sysparm_query: "user_name={{ managed_by_user }}"
      register: managed_by_lookup

    - name: Resolve the 'Managed by' user sys_id (empty if not found)
      ansible.builtin.set_fact:
        managed_by_sys_id: "{{ managed_by_lookup.record[0].sys_id if (managed_by_lookup.record | length > 0) else '' }}"

    - name: Warn if the 'Managed by' user was not found
      when: managed_by_sys_id | length == 0
      ansible.builtin.debug:
        msg: "WARNING: no sys_user matched user_name '{{ managed_by_user }}' — leaving Managed by unset."

    # --- Host CI (create or update) ------------------------------------------
    - name: Create or update the host configuration item
      servicenow.itsm.configuration_item:
        name: "{{ cmdb_ci_fqdn }}"
        state: present
        short_description: "RHEL 9 (AWS EC2 {{ cmdb_ci_instance | default('n/a', true) }}) — Lightspeed Patching demo"
        serial_number: "{{ cmdb_ci_instance if cmdb_ci_instance else omit }}"
        sys_class_name: "{{ ci_resource }}"
        assigned_to: "{{ ci_assigned_to }}"
        environment: "{{ ci_environment }}"
        install_status: "{{ ci_install_status }}"
        category: "{{ ci_category }}"
        operational_status: "{{ ci_operational_status }}"
        ip_address: "{{ cmdb_ci_ip if cmdb_ci_ip else omit }}"
        other:
          fqdn: "{{ cmdb_ci_fqdn }}"
          model_number: "{{ cmdb_ci_size if cmdb_ci_size else omit }}"
          assignment_group: "{{ ci_support_group }}"
          managed_by: "{{ managed_by_sys_id if managed_by_sys_id else omit }}"
      register: ci_result

    - name: Resolve the host CI sys_id
      ansible.builtin.set_fact:
        ci_sys_id: "{{ ci_result.record.sys_id }}"

    # --- Relationship (create if missing) ------------------------------------
    - name: Check for an existing relationship
      servicenow.itsm.api_info:
        resource: cmdb_rel_ci
        sysparm_query: "parent={{ ci_sys_id }}^child={{ ba_sys_id }}"
      register: rel_lookup

    - name: Relate the host CI to the Business Application (Uses::Used by)
      when: rel_lookup.record | length == 0
      servicenow.itsm.api:
        action: post
        resource: cmdb_rel_ci
        data:
          parent: "{{ ci_sys_id }}"
          child: "{{ ba_sys_id }}"
          type: "{{ cmdb_rel_type }}"

    # --- RITM linkage (ServiceNow-driven runs only) -------------------------
    - name: Link CI to the originating RITM (Affected CIs)
      when:
        - ticket_number is defined
        - ticket_number | string | length > 0
      block:
        - name: Use the threaded RITM sys_id when present
          ansible.builtin.set_fact:
            ritm_sys_id: "{{ ticket_sys_id }}"
          when:
            - ticket_sys_id is defined
            - ticket_sys_id | string | length > 0

        - name: Resolve the RITM sys_id by number (fallback)
          when: ritm_sys_id is not defined
          block:
            - name: Query sc_req_item by number
              register: ritm_lookup
              servicenow.itsm.api_info:
                resource: sc_req_item
                sysparm_query: "numberSTARTSWITH{{ ticket_number }}"

            - name: Fail clearly if the RITM was not found
              ansible.builtin.assert:
                that:
                  - ritm_lookup.record | length > 0
                fail_msg: "No sc_req_item matched number '{{ ticket_number }}'."

            - name: Set sys_id from the lookup
              ansible.builtin.set_fact:
                ritm_sys_id: "{{ ritm_lookup.record[0].sys_id }}"

        - name: Link the CI to the RITM via task_ci
          servicenow.itsm.api:
            action: post
            resource: task_ci
            data:
              task: "{{ ritm_sys_id }}"
              ci_item: "{{ ci_sys_id }}"

    # --- Publish artifacts + summary -----------------------------------------
    - name: Publish CI sys_id as a workflow artifact
      ansible.builtin.set_stats:
        data:
          cmdb_ci_sys_id: "{{ ci_sys_id }}"

    - name: Summary
      ansible.builtin.debug:
        msg: >-
          CI {{ cmdb_ci_fqdn }} ({{ ci_sys_id }}) related to Business Application
          '{{ cmdb_business_app }}' ({{ ba_sys_id }}) via '{{ cmdb_rel_type }}'.
