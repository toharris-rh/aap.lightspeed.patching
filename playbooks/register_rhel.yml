---
# ============================================================================
# playbooks/register_rhel.yml
# ============================================================================
# Registers a new RHEL host to the Red Hat CDN and Red Hat Insights in a
# single play. Must run after the host is reachable via SSH.
#
# Step 0 — Hostname: set the OS hostname to the public FQDN BEFORE registering,
#           so the host's canonical `fqdn` fact (reported to subscription-manager
#           and Insights) matches the AAP inventory name and the CMDB CI name.
# Step 1 — CDN: subscription-manager via the rhc system role + activation key.
# Step 2 — Insights: installs insights-client and registers with
#           --display-name={{ inventory_hostname }} so the public FQDN
#           (not the private EC2 hostname) appears in console.redhat.com.
#
# Credentials: Lightspeed Patching - Red Hat CDN  (RH_ORG_ID, RH_ACTIVATION_KEY)
#              Lightspeed Patching - Linux Machine (SSH)
# ============================================================================

- name: Register RHEL to Red Hat CDN and Red Hat Insights
  hosts: all
  gather_facts: false
  become: true

  vars:
    rh_org_id: "{{ lookup('ansible.builtin.env', 'RH_ORG_ID') }}"
    rh_activation_key: "{{ lookup('ansible.builtin.env', 'RH_ACTIVATION_KEY') }}"

  tasks:
    - name: Assert CDN registration credentials are set
      ansible.builtin.assert:
        that:
          - rh_org_id | length > 0
          - rh_activation_key | length > 0
        fail_msg: "RH_ORG_ID and RH_ACTIVATION_KEY must be set (use the 'Lightspeed Patching - Red Hat CDN' credential)."

    # ── Step 0: Hostname ──────────────────────────────────────────────────────
    # Set the OS hostname to the public FQDN (the AAP inventory host name) BEFORE
    # registering, so the canonical `fqdn` fact reported to the CDN and Insights
    # matches the name used in AAP inventory and the ServiceNow CMDB CI.
    - name: Set OS hostname to the public FQDN (before CDN/Insights registration)
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"

    # ── Step 1: Red Hat CDN ───────────────────────────────────────────────────
    - name: Register to Red Hat CDN (certified rhc system role)
      ansible.builtin.include_role:
        name: redhat.rhel_system_roles.rhc
      vars:
        rhc_state: present
        # The org id is the TOP-LEVEL rhc_organization var — the role's
        # subscription-manager task does org_id: "{{ rhc_organization }}".
        # It is NOT read from rhc_auth (top level or under activation_keys);
        # putting it there gives "org_id is required when using activationkey".
        rhc_organization: "{{ rh_org_id }}"
        rhc_auth:
          activation_keys:
            keys:
              - "{{ rh_activation_key }}"
        rhc_auto_attach: true

    # ── Step 2: Red Hat Insights ──────────────────────────────────────────────
    - name: Install insights-client
      ansible.builtin.dnf:
        name: insights-client
        state: present

    - name: Register with Insights (display-name set to public FQDN)
      ansible.builtin.command:
        cmd: "insights-client --register --display-name={{ inventory_hostname }}"
      register: insights_reg
      changed_when: "'Successfully registered' in insights_reg.stdout"
      failed_when: insights_reg.rc != 0 and 'already registered' not in insights_reg.stdout

    - name: Trigger initial Insights check-in
      ansible.builtin.command:
        cmd: insights-client --check-results
      changed_when: false
      failed_when: false

    - name: Show Insights registration result
      ansible.builtin.debug:
        msg: "{{ insights_reg.stdout }}"

    # ── ServiceNow work note ──────────────────────────────────────────────────
    - name: Log registration to ServiceNow
      ansible.builtin.include_role:
        name: snow_log
      vars:
        snow_log_resource: incident
        snow_log_ticket_number: "{{ ticket_number | default('') }}"
        snow_log_ticket_sys_id: "{{ ticket_sys_id | default('') }}"
        snow_log_message: >-
          {{ inventory_hostname }}: Registered to Red Hat CDN
          (org: {{ rh_org_id }}, key: {{ rh_activation_key }})
          and Red Hat Insights (display-name: {{ inventory_hostname }}).
      when: ticket_number is defined and ticket_number | length > 0
